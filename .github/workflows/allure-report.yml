name: Allure Report

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pytest allure-pytest requests beautifulsoup4
          pip install -e . || true # Installs your project in editable mode if setup.py exists

      - name: Run Tests
        env:
          PYTHONPATH: .
        # Running tests and ensuring results are saved to the correct folder
        run: pytest tests/ --alluredir=allure-results || true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Fix for GitHub Pages
        if: always()
        run: touch allure-report/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report